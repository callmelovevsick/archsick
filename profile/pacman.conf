#
# ArchSick pacman.conf — forked from Archcraft
# Developer: lovevsick
#
[options]
HoldPkg      = pacman glibc
Architecture = auto
Color
VerbosePkgLists
ParallelDownloads = 10
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# ── ArchSick custom repo ──────────────────────────────────────
# Uncomment when repo is live at https://repo.archsick.dev
#[archsick]
#SigLevel = Optional TrustAll
#Server = https://repo.archsick.dev/$arch

# ── Keep Archcraft repo for shared packages ───────────────────
[archcraft]
SigLevel = Optional TrustAll
Include = /etc/pacman.d/archcraft-mirrorlist

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
