# ============================================================
# ArchSick picom configuration
# Optimized for Intel/AMD iGPU, low overhead
# Developer: lovevsick
# ============================================================

# ── Backend ──────────────────────────────────────────────────
# xrender: safer for older Intel HD, zero GL overhead
# glx:     better performance on UHD/modern iGPUs
# Use glx for Intel Iris Xe, Ryzen iGPU; xrender for older
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;

# ── Performance ──────────────────────────────────────────────
sync-drm = false;
dbe = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
vsync = true;

# ── Opacity ──────────────────────────────────────────────────
active-opacity = 1.0;
inactive-opacity = 0.95;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "100:class_g = 'Alacritty' && focused",
    "90:class_g  = 'Alacritty' && !focused",
    "100:class_g = 'vscodium'",
    "100:class_g = 'osu!'",
    "100:class_g = 'PrismLauncher'",
    "100:class_g = 'steam'",
    "100:fullscreen"
];

# ── Fading ────────────────────────────────────────────────────
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;
no-fading-openclose = false;
no-fading-destroyed-argb = true;

# ── Shadows ──────────────────────────────────────────────────
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-shadow-y = -12;
shadow-opacity = 0.5;
shadow-color = "#000000";

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g = 'dunst'",
    "class_g ?= 'Notify-osd'",
    "_GTK_FRAME_EXTENTS@:c",
    "window_type = 'tooltip'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ── Blur ─────────────────────────────────────────────────────
# Disabled by default for performance
# Enable on systems with enough GPU headroom
blur-background = false;
# blur-method = "dual_kawase";
# blur-strength = 3;

# ── Exclusions ───────────────────────────────────────────────
focus-exclude = [
    "class_g = 'Cairo-clock'",
    "class_g = 'Steam'",
    "class_g = 'osu!'",
    "window_type = 'desktop'"
];

# ── Window types ─────────────────────────────────────────────
wintypes:
{
    tooltip = { fade = true; shadow = false; opacity = 0.9; focus = true; };
    dock    = { shadow = false; clip-shadow-above = true; };
    dnd     = { shadow = false; };
    popup_menu = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};
