# ============================================================
# ArchSick GRUB configuration
# Developer: lovevsick
# ============================================================

# Load modules
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ntfs
insmod ntfscomp
insmod exfat
insmod udf

# Graphics mode
if loadfont "${prefix}/fonts/unicode.pf2" ; then
    insmod all_video
    set gfxmode="auto"
    terminal_input  console
    terminal_output console
fi

# Serial console
insmod serial
insmod usbserial_common
insmod usbserial_ftdi
insmod usbserial_pl2303
insmod usbserial_usbdebug
if serial --unit=0 --speed=115200; then
    terminal_input  --append serial
    terminal_output --append serial
fi

# Platform label
if   [ "${grub_platform}" == 'efi' ]; then archiso_platform='UEFI'
elif [ "${grub_platform}" == 'pc'  ]; then archiso_platform='BIOS'
else archiso_platform="${grub_cpu}-${grub_platform}"
fi

# ── Boot menu ─────────────────────────────────────────────────
default=archsick
timeout=3
timeout_style=countdown

menuentry "Boot ArchSick (%ARCH%, ${archiso_platform})" \
    --class archsick --class arch --class gnu-linux --class gnu --class os \
    --id 'archsick' {
    set gfxpayload=keep
    linux  /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux \
        archisobasedir=%INSTALL_DIR% \
        archisosearchuuid=%ARCHISO_UUID% \
        quiet splash loglevel=3 udev.log_level=3 \
        vt.global_cursor_default=0 \
        cow_spacesize=5G copytoram=n nvme_load=yes \
        lsm=landlock,lockdown,yama,integrity,apparmor,bpf
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

menuentry "Boot ArchSick (%ARCH%, ${archiso_platform}, Open Source GPU)" \
    --class archsick --class arch --class gnu-linux --class gnu --class os \
    --id 'archsick-oss' {
    set gfxpayload=keep
    linux  /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux \
        archisobasedir=%INSTALL_DIR% \
        archisosearchuuid=%ARCHISO_UUID% \
        quiet splash loglevel=3 udev.log_level=3 \
        vt.global_cursor_default=0 \
        cow_spacesize=5G copytoram=n \
        module_blacklist=nvidia,nvidia_modeset,nvidia_uvm,nvidia_drm \
        nouveau.modeset=1 radeon.modeset=1 i915.modeset=1 \
        nvme_load=yes lsm=landlock,lockdown,yama,integrity,apparmor,bpf
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

menuentry "Boot ArchSick (%ARCH%, ${archiso_platform}, Nomodeset)" \
    --class archsick --class arch --class gnu-linux --class gnu --class os \
    --id 'archsick-nomodeset' {
    set gfxpayload=keep
    linux  /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux \
        archisobasedir=%INSTALL_DIR% \
        archisosearchuuid=%ARCHISO_UUID% \
        quiet splash loglevel=3 udev.log_level=3 \
        vt.global_cursor_default=0 \
        cow_spacesize=5G copytoram=n nomodeset \
        module_blacklist=nvidia,nvidia_modeset,nvidia_uvm,nvidia_drm \
        nouveau.modeset=0 radeon.modeset=0 i915.modeset=0 \
        nvme_load=yes lsm=landlock,lockdown,yama,integrity,apparmor,bpf
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

# Memtest
if [ "${grub_platform}" == 'efi' -a "${grub_cpu}" == 'x86_64' -a -f '/boot/memtest86+/memtest.efi' ]; then
    menuentry 'Run Memtest86+ (RAM test)' --class memtest86 --class tool {
        set gfxpayload=800x600,1024x768
        linux /boot/memtest86+/memtest.efi
    }
fi
if [ "${grub_platform}" == 'pc' -a -f '/boot/memtest86+/memtest' ]; then
    menuentry 'Run Memtest86+ (RAM test)' --class memtest86 --class tool {
        set gfxpayload=800x600,1024x768
        linux /boot/memtest86+/memtest
    }
fi

# UEFI shell/firmware
if [ "${grub_platform}" == 'efi' ]; then
    if [ "${grub_cpu}" == 'x86_64' -a -f '/shellx64.efi' ]; then
        menuentry 'UEFI Shell' --class efi { chainloader /shellx64.efi }
    fi
    menuentry 'UEFI Firmware Settings' --class efi --id 'uefi-firmware' { fwsetup }
fi

menuentry 'System shutdown' --class shutdown { halt   }
menuentry 'System restart'  --class restart  { reboot }
