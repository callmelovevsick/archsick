DEFAULT archsick
PROMPT 0
TIMEOUT 30

LABEL archsick
    MENU LABEL Boot ArchSick (x86_64, BIOS)
    LINUX    boot/x86_64/vmlinuz-linux
    INITRD   boot/x86_64/initramfs-linux.img
    APPEND   archisobasedir=arch archisosearchuuid=%ARCHISO_UUID% quiet splash loglevel=3 udev.log_level=3 vt.global_cursor_default=0 cow_spacesize=5G nvme_load=yes lsm=landlock,lockdown,yama,integrity,apparmor,bpf
    SYSAPPEND 3

LABEL archsick-oss
    MENU LABEL Boot ArchSick (x86_64, BIOS, Open Source GPU)
    LINUX    boot/x86_64/vmlinuz-linux
    INITRD   boot/x86_64/initramfs-linux.img
    APPEND   archisobasedir=arch archisosearchuuid=%ARCHISO_UUID% quiet splash loglevel=3 udev.log_level=3 vt.global_cursor_default=0 cow_spacesize=5G module_blacklist=nvidia,nvidia_modeset,nvidia_uvm,nvidia_drm nouveau.modeset=1 radeon.modeset=1 i915.modeset=1 nvme_load=yes lsm=landlock,lockdown,yama,integrity,apparmor,bpf
    SYSAPPEND 3

LABEL archsick-nomodeset
    MENU LABEL Boot ArchSick (x86_64, BIOS, Nomodeset)
    LINUX    boot/x86_64/vmlinuz-linux
    INITRD   boot/x86_64/initramfs-linux.img
    APPEND   archisobasedir=arch archisosearchuuid=%ARCHISO_UUID% quiet splash loglevel=3 udev.log_level=3 vt.global_cursor_default=0 cow_spacesize=5G nomodeset nvme_load=yes lsm=landlock,lockdown,yama,integrity,apparmor,bpf
    SYSAPPEND 3

LABEL memtest
    MENU LABEL Run Memtest86+ (RAM test)
    LINUX boot/memtest86+/memtest
    SYSAPPEND 3

LABEL hdt
    MENU LABEL HDT (Hardware Detection Tool)
    COM32 boot/syslinux/hdt.c32
    APPEND pciids=boot/syslinux/pci.ids

LABEL reboot
    MENU LABEL Reboot
    COM32 boot/syslinux/reboot.c32

LABEL poweroff
    MENU LABEL Power Off
    COM32 boot/syslinux/poweroff.c32
